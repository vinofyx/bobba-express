name: E2E Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18, 20]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Install Newman
        run: npm install -g newman newman-reporter-htmlextra

      - name: Create reports directory
        run: mkdir -p reports

      - name: Setup test database
        run: |
          npm run test:setup
        env:
          DATABASE_URL: ${{ secrets.TEST_DATABASE_URL }}
          NODE_ENV: test

      - name: Build application
        run: npm run build
        env:
          DATABASE_URL: ${{ secrets.TEST_DATABASE_URL }}

      - name: Start application
        run: |
          npm run start &
          echo $!
        env:
          DATABASE_URL: ${{ secrets.TEST_DATABASE_URL }}
          NODE_ENV: test
          PORT: 3000

      - name: Wait for server to be ready
        run: |
          timeout 60 bash -c 'until curl -f http://localhost:3000/api/health; do sleep 2; done'
          echo "Server is ready!"

      - name: Run Playwright E2E Tests
        run: |
          npx playwright test \
            --reporter=html,list \
            --output-dir=playwright-results
        env:
          DATABASE_URL: ${{ secrets.TEST_DATABASE_URL }}

      - name: Run Newman API Tests
        run: |
          newman run tests/bobba-api-tests.json \
            --environment tests/bobba-ci-env.json \
            --bail \
            --reporters htmlextra,junit,cli \
            --reporter-htmlextra-export ./reports/api-test-report.html \
            --reporter-junit-export ./reports/api-test-results.xml \
            --timeout-request 30000 \
            --timeout-script 10000
        env:
          DATABASE_URL: ${{ secrets.TEST_DATABASE_URL }}

      - name: Upload Playwright Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report-node-${{ matrix.node-version }}
          path: playwright-results/
          retention-days: 30

      - name: Upload Newman Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: newman-report-node-${{ matrix.node-version }}
          path: reports/
          retention-days: 30

      - name: Publish Test Results
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: E2E Tests (Node ${{ matrix.node-version }})
          path: reports/*.xml
          reporter: java-junit

  integration-tests:
    timeout-minutes: 30
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'pull_request'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Newman
        run: npm install -g newman newman-reporter-htmlextra

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: playwright-report-node-*
          path: reports/

      - name: Comment PR with results
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = './reports';
            
            let comment = `## 🧪 E2E Test Results\n\n`;
            
            // Check for test results
            if (fs.existsSync(path + '/api-test-results.xml')) {
              comment += `✅ **API Tests**: Completed\n`;
            }
            
            if (fs.existsSync(path + '/playwright-report/index.html')) {
              comment += `✅ **Playwright Tests**: Completed\n`;
            }
            
            comment += `\n**Workflow**: [View Details](${context.payload.repository.html_url}/actions/runs/${context.runId})\n`;
            comment += `**Branch**: ${github.ref_name}\n`;
            comment += `**Commit**: ${github.sha.substring(0, 7)}\n\n`;
            
            comment += `📊 **Test Artifacts**: Available in the Actions tab\n\n`;
            comment += `🔍 **Next Steps**:\n`;
            comment += `1. Review the test artifacts for detailed results\n`;
            comment += `2. Check the workflow logs for any failures\n`;
            comment += `3. Download the HTML reports for visual analysis`;
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });
