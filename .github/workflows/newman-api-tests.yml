name: Newman API Tests

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master ]
  schedule:
    # Run API tests daily at 8 AM UTC
    - cron: '0 8 * * *'

jobs:
  api-tests:
    timeout-minutes: 30
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        node-version: [18, 20]
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'
    
    - name: Install Newman
      run: |
        npm install -g newman newman-reporter-htmlextra
    
    - name: Create reports directory
      run: |
        mkdir -p reports
    
    - name: Wait for server to be ready
      run: |
        timeout 300 bash -c 'until curl -f http://localhost:5000/api/health; do sleep 5; done'
    
    - name: Run Newman API Tests
      run: |
        newman run bobba-api-tests.json \
          --environment bobba-dev-env.json \
          --bail \
          --reporters junit,htmlextra,cli \
          --reporter-junit-export ./reports/api-test-results.xml \
          --reporter-htmlextra-export ./reports/api-test-report.html \
          --timeout-request 30000 \
          --timeout-script 10000
      continue-on-error: false
    
    - name: Upload Test Results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: api-test-reports-node-${{ matrix.node-version }}
        path: reports/
        retention-days: 30
    
    - name: Publish Test Results
      uses: dorny/test-reporter@v1
      if: always()
      with:
        name: API Tests (Node ${{ matrix.node-version }})
        path: reports/*.xml
        reporter: java-junit
    
    - name: Publish HTML Report
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: api-test-html-report-node-${{ matrix.node-version }}
        path: reports/api-test-report.html
        retention-days: 30

  performance-tests:
    timeout-minutes: 15
    runs-on: ubuntu-latest
    needs: api-tests
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
    
    - name: Install Newman
      run: |
        npm install -g newman newman-reporter-htmlextra
    
    - name: Create reports directory
      run: |
        mkdir -p reports
    
    - name: Run Performance Tests
      run: |
        newman run bobba-api-tests.json \
          --environment bobba-dev-env.json \
          --iteration-count 20 \
          --iteration-delay 1000 \
          --reporters csv,cli \
          --reporter-csv-export ./reports/performance-results.csv \
          --timeout-request 30000
    
    - name: Upload Performance Results
      uses: actions/upload-artifact@v4
      with:
        name: performance-test-results
        path: reports/performance-results.csv
        retention-days: 30
    
    - name: Comment Performance Results
      uses: actions/github-script@v7
      with:
        script: |
          const fs = require('fs');
          const path = './reports/performance-results.csv';
          
          if (fs.existsSync(path)) {
            const csv = fs.readFileSync(path, 'utf8');
            const lines = csv.split('\n');
            const headers = lines[0].split(',');
            const responseTimeIndex = headers.indexOf('responseTime');
            
            let responseTimes = [];
            for (let i = 1; i < lines.length - 1; i++) {
              const values = lines[i].split(',');
              if (values[responseTimeIndex]) {
                responseTimes.push(parseFloat(values[responseTimeIndex]));
              }
            }
            
            if (responseTimes.length > 0) {
              const avgResponseTime = responseTimes.reduce((a, b) => a + b, 0) / responseTimes.length;
              const maxResponseTime = Math.max(...responseTimes);
              const minResponseTime = Math.min(...responseTimes);
              
              const comment = `## 📊 API Performance Test Results\n\n` +
                `**Average Response Time**: ${avgResponseTime.toFixed(2)}ms\n` +
                `**Max Response Time**: ${maxResponseTime.toFixed(2)}ms\n` +
                `**Min Response Time**: ${minResponseTime.toFixed(2)}ms\n` +
                `**Total Requests**: ${responseTimes.length}\n\n` +
                `Performance tests completed successfully! 🚀`;
              
              github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: comment
              });
            }
          }

  notify-results:
    runs-on: ubuntu-latest
    needs: [api-tests]
    if: always()
    
    steps:
    - name: Notify Test Results
      uses: actions/github-script@v7
      with:
        script: |
          const status = '${{ needs.api-tests.result }}';
          const workflowUrl = `https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}`;
          
          let message = `## 🧪 Newman API Test Results\n\n`;
          
          if (status === 'success') {
            message += `✅ **All API tests passed successfully!**\n\n`;
          } else {
            message += `❌ **API tests failed!**\n\n`;
          }
          
          message += `**Workflow**: [View Details](${workflowUrl})\n`;
          message += `**Branch**: ${github.ref_name}\n`;
          message += `**Commit**: ${github.sha.substring(0, 7)}\n`;
          message += `**Trigger**: ${github.event_name}\n\n`;
          
          if (status === 'failure') {
            message += `🔍 **Next Steps**:\n`;
            message += `1. Check the workflow logs for detailed error messages\n`;
            message += `2. Review the test artifacts for failed requests\n`;
            message += `3. Verify server is running and accessible\n`;
            message += `4. Check database connection and test data\n`;
          }
          
          // Create or update a comment on the PR/issue
          if (github.event_name === 'pull_request') {
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: message
            });
          }
          
          // Log the message for debugging
          console.log(message);
