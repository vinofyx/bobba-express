$kind: http-request
name: Update Customer
method: PUT
url: '{{baseUrl}}/api/customers/{{customerId}}'
description: Update customer details.
order: 4000
auth:
  type: bearer
  credentials:
    - key: token
      value: '{{authToken}}'
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "type": "B2C",
      "name": "Ravi Kumar Updated",
      "phone": "9876543210",
      "email": "ravi.updated@example.com",
      "address": {
        "line1": "456 New Street",
        "city": "Mumbai",
        "state": "Maharashtra",
        "pincode": "400002"
      }
    }
