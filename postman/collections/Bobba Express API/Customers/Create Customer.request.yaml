$kind: http-request
name: Create Customer
method: POST
url: '{{baseUrl}}/api/customers'
description: 'Create a new customer. type can be B2B or B2C. B2B requires companyName.'
order: 3000
auth:
  type: bearer
  credentials:
    - key: token
      value: '{{authToken}}'
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "type": "B2C",
      "name": "Ravi Kumar",
      "phone": "9876543210",
      "email": "ravi@example.com",
      "address": {
        "line1": "123 Main Street",
        "city": "Mumbai",
        "state": "Maharashtra",
        "pincode": "400001"
      }
    }
