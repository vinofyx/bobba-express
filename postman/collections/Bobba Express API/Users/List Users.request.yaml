$kind: http-request
name: List Users
method: GET
url: '{{baseUrl}}/api/users'
description: |-
  List all users. Admin/staff only.
  Query params: role (admin|staff|agent), isActive (true|false)
order: 1000
auth:
  type: bearer
  credentials:
    - key: token
      value: '{{authToken}}'
queryParams:
  - key: role
    value: agent
    disabled: true
  - key: isActive
    value: 'true'
    disabled: true
