$kind: http-request
name: Create Pickup
method: POST
url: '{{baseUrl}}/api/pickups'
description: Schedule a new pickup. Admin/staff only.
order: 3000
auth:
  type: bearer
  credentials:
    - key: token
      value: '{{authToken}}'
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "customer": "{{customerId}}",
      "pickupAddress": {
        "line1": "123 Sender Street",
        "city": "Mumbai",
        "state": "Maharashtra",
        "pincode": "400001"
      },
      "scheduledDate": "2026-05-10T10:00:00.000Z",
      "pickupTime": "10:00 AM",
      "deliveryType": "standard",
      "parcelType": "parcel",
      "parcelCount": 2,
      "notes": "Handle with care"
    }
