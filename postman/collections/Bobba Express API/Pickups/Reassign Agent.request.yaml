$kind: http-request
name: Reassign Agent
method: PUT
url: '{{baseUrl}}/api/pickups/{{pickupId}}/reassign'
description: Reassign a pickup to a different agent. Admin/staff only.
order: 5000
auth:
  type: bearer
  credentials:
    - key: token
      value: '{{authToken}}'
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "agentId": "{{agentId}}"
    }
