$kind: http-request
name: Register
method: POST
url: '{{baseUrl}}/api/auth/register'
description: Register a new user. Role can be admin, staff, or agent.
order: 1000
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "name": "John Doe",
      "email": "john@example.com",
      "password": "password123",
      "role": "staff"
    }
