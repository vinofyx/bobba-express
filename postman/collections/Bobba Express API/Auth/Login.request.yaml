$kind: http-request
name: Login
method: POST
url: '{{baseUrl}}/api/auth/login'
description: Login with email and password. Returns an accessToken to use as Bearer token.
order: 2000
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "email": "admin@bobbaexpress.com",
      "password": "password123"
    }
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      const res = pm.response.json();
      if (res.success && res.data?.accessToken) {
        pm.collectionVariables.set('authToken', res.data.accessToken);
        console.log('Token saved to authToken variable');
      }
